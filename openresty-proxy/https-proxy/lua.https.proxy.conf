init_by_lua_block {
    function match_host_dir_rules(domain, request_uri)
        local m
        
        -- 规则1: version1
        m = ngx.re.match(domain, [[^(.*)\.(.*)\.port\.(\d+)\.version1\.(?:(http|https)\.)?proxy_sslip(\.\d+\.\d+\.\d+\.\d+\.sslip\.io)$]], "jo")
        if m then
            return {
                rule_type = "version1",
                proxy_pass = (m[4] or "http") .. "://" .. m[2] .. ":" .. m[3] .. request_uri
            }
        end

        -- 规则2: port.host
        m = ngx.re.match(domain, [[^(.*)\.(.*)\.port\.(\d+)\.host\.(.*)\.(?:(http|https)\.)?proxy_sslip(\.\d+\.\d+\.\d+\.\d+\.sslip\.io)$]], "jo")
        if m then
            return {
                proxy_pass = (m[5] or "http") .. "://" .. m[2] .. ":" .. m[3] .. request_uri
            }
        end

        -- 规则3: port
        m = ngx.re.match(domain, [[^(.*)\.(.*)\.port\.(\d+)\.(?:(http|https)\.)?proxy_sslip(\.\d+\.\d+\.\d+\.\d+\.sslip\.io)$]], "jo")
        if m then
            return {
                proxy_pass = (m[4] or "http") .. "://" .. m[2] .. ":" .. m[3] .. request_uri
            }
        end

        -- 规则4: no_ws
        m = ngx.re.match(domain, [[^(.*)\.(.*)\.port\.(\d+)\.(?:(http|https)\.)?no_ws\.proxy_sslip(\.\d+\.\d+\.\d+\.\d+\.sslip\.io)$]], "jo")
        if m then
            return {
                rule_type = "no_ws",
                proxy_pass = (m[4] or "http") .. "://" .. m[2] .. ":" .. m[3] .. request_uri
            }
        end

        -- 规则5: first_path
        m = ngx.re.match(domain, [[^(.*)\.first_path\.(?:(http|https)\.)?proxy_sslip(\.\d+\.\d+\.\d+\.\d+\.sslip\.io)$]], "jo")
        if m then
            local first_dir = ngx.re.match(request_uri, "^/([^/]+)")
            if first_dir then
                local parts = ngx.re.match(first_dir[1], [[^(.*)--(\d+)$]])
                if parts and parts[1] and parts[2] then
                    return {
                        proxy_pass = (m[2] or "http") .. "://" .. parts[1] .. ":" .. parts[2] .. request_uri
                    }
                end
            end
        end

        -- 规则6: 通用
        m = ngx.re.match(domain, [[^(.*)\.(.+?)\.(?:(http|https)\.)?proxy_sslip(\.\d+\.\d+\.\d+\.\d+\.sslip\.io)$]], "jo")
        if m then
            return {
                proxy_pass = (m[3] or "http") .. "://" .. m[2] .. request_uri
            }
        end

        return nil
    end
}

server {
    listen 80 default_server;
    listen 443 ssl;
    # listen 443;
    server_name _;
    # resolver 127.0.0.11:53 223.5.5.5 valid=10s;
    resolver 127.0.0.11:53 valid=10s;
    # resolver_timeout 1s;

    error_log  /usr/local/openresty/nginx/logs/error.log  info;

    # 用于满足 Nginx 配置的占位符
    # ssl_certificate /etc/nginx/ssl/default.crt;
    # ssl_certificate_key /etc/nginx/ssl/default.key;
    ssl_certificate /etc/nginx/server.crt;
    ssl_certificate_key /etc/nginx/server.key;

    #access_by_lua_block {
    #    ngx.log(ngx.ERR, "access_by_lua_block---------------------")
    #    ngx.ctx.domain = ngx.var.host
    #}

    ssl_certificate_by_lua_block {
            -- ngx.log(ngx.ERR, "qqqqqqqq")
            local ssl = require "ngx.ssl"

        local ok, err = ssl.clear_certs()
        if not ok then
            ngx.log(ngx.ERR, "failed to clear existing (fallback) certificates")
            return ngx.exit(ngx.ERROR)
        end
        

        -- ngx.log(ngx.ERR, "ggggggggggggggg")
        local ssl_dir = "/etc/nginx/ssl"
        -- ngx.log(ngx.ERR, "ggggggggggggggg---1")
        -- ngx.log(ngx.ERR, ngx.config.ngx_lua_version)
        
        -- 没有处理默认www的情况
        local domain, err = ssl.server_name()
        
        if not ok then
            ngx.log(ngx.ERR, "failed to clear existing (fallback) certificates")
            return ngx.exit(ngx.ERROR)
        end

        if domain then
            ngx.log(ngx.INFO, "domain=" .. domain)
        else
            -- 不支持 curl -H 'Host:www.baidu.com' https://172.18.0.12
            ngx.log(ngx.ERR, "domain 为空，不支持在Header里指定Host")
            return ngx.exit(ngx.ERROR)
        end
        
        -- print('ggggggggggggggg---a')
        -- print(ngx)
        -- local domain = ngx.ctx.domain
        -- local domain = ngx.var.host
        -- ngx.log(ngx.ERR, "ggggggggggggggg---2")
        -- ngx.log(ngx.ERR, domain)
        local cert_path = ssl_dir .. "/" .. domain .. ".crt"
        -- ngx.log(ngx.ERR, "ggggggggggggggg---3")
        local key_path = ssl_dir .. "/" .. domain .. ".key"
        
        ngx.log(ngx.INFO, cert_path)
        ngx.log(ngx.INFO, key_path)

        -- local has_cert = (ngx.req.get_headers()["Host"] == domain) and (file_exists(cert_path))

        -- if has_cert then
            -- 获取证书内容，比如 io.open("my.crt"):read("*a")

            local file = io.open(cert_path, "r")
            local cert_data = ''
            if file then
                cert_data = file:read("*a")
                file:close()
            elseif os.getenv("AUTO_MKCERT") == "1" then
                ngx.log(ngx.INFO, "Cert not found, AUTO_MKCERT is enabled, generating cert for " .. domain)
                -- 假设 mkcert.sh 脚本位于 /etc/nginx/mkcert/ 目录下
                -- 使用 io.popen 捕获标准输出和标准错误
                local command = "/mkcert.sh " .. domain .. " 2>&1"
                local handle = io.popen(command)
                if not handle then
                    ngx.log(ngx.ERR, "Failed to execute io.popen for command: " .. command)
                    return ngx.exit(ngx.ERROR)
                end

                local output = handle:read("*a")
                local ok, _, code = handle:close()

                -- 无论成功与否，都将脚本输出记录到日志
                ngx.log(ngx.INFO, "mkcert.sh execution for domain '" .. domain .. "' finished with exit code " .. tostring(code) .. ". Output:\n" .. output)

                -- 重新读取生成的文件
                file = io.open(cert_path, "r")
                if not file then
                    ngx.log(ngx.ERR, "Failed to read cert file after generation: " .. cert_path)
                    return ngx.exit(ngx.ERROR)
                end
                cert_data = file:read("*a")
                file:close()
            end

            local pkey_data = ''
            file = io.open(key_path, "r")
            if file then
                pkey_data = file:read("*a")
                file:close()
            end

            -- ngx.ctx.ssl_certificate = cert_data
            -- ngx.ctx.ssl_certificate_key = key_data

            -- local cert_data, err = get_my_pem_cert_data()
            if not cert_data then
                ngx.log(ngx.ERR, "failed to get PEM cert: ", err)
                return
            end
            -- 解析出 cdata 类型的证书值，你可以用 lua-resty-lrucache 缓存解析结果
            local cert, err = ssl.parse_pem_cert(cert_data)
            if not cert then
                ngx.log(ngx.ERR, "failed to parse PEM cert: ", err)
                return
            end
            local ok, err = ssl.set_cert(cert)
            if not ok then
                ngx.log(ngx.ERR, "failed to set cert: ", err)
                return
            end
            -- local pkey_data, err = get_my_pem_priv_key_data()
            if not pkey_data then
                ngx.log(ngx.ERR, "failed to get DER private key: ", err)
                return
            end
            local pkey, err = ssl.parse_pem_priv_key(pkey_data)
            if not pkey then
                ngx.log(ngx.ERR, "failed to parse pem key: ", err)
                return
            end
            local ok, err = ssl.set_priv_key(pkey)
            if not ok then
                ngx.log(ngx.ERR, "failed to set private key: ", err)
                return
            end
        -- end
            -- ngx.log(ngx.ERR, "eeeeeeeeeeeeeeeeeeeeee")
    }

    location / {
        # resolver 192.168.3.1;
        # resolver_timeout 1s;
        # set $lua_max_body_size '200M';
        # client_max_body_size 200M;
        client_max_body_size --client_max_body_size--;

        # set $scheme 'https';
        set $proxy_pass 'https://www.baidu.com';
        add_header       X-Served-By $host;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Scheme $scheme;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_pass $proxy_pass;
        proxy_set_header Upgrade $http_upgrade; 
        proxy_set_header Connection "Upgrade";
        proxy_connect_timeout --proxy_timeout--;
        proxy_send_timeout --proxy_timeout--;
        proxy_read_timeout --proxy_timeout--; 

    access_by_lua_block {
        local domain = ngx.var.host

        if os.getenv("PROXY_PASS_ALL") then
            if ngx.re.match(domain, [[\.proxy_sslip\.\d+\.\d+\.\d+\.\d+\.sslip\.io$]], "jo") then
                ngx.var.proxy_pass = "http://127.0.0.1:8080" .. ngx.var.request_uri
                ngx.log(ngx.INFO, "proxy_sslip domain matched, forwarding to internal 8080: " .. ngx.var.proxy_pass)
            else
                ngx.var.proxy_pass = os.getenv("PROXY_PASS_ALL") .. ngx.var.request_uri
                ngx.log(ngx.INFO, "PROXY_PASS_ALL: using env variable, forwarding to: " .. ngx.var.proxy_pass)
            end
        else
            local result = match_host_dir_rules(domain, ngx.var.request_uri)
            if result then
                ngx.ctx.rule_type = result.rule_type
                ngx.var.proxy_pass = result.proxy_pass
            else
                local ssl_dir = "/etc/nginx/ssl"
                local cert_path = ssl_dir .. "/" .. domain .. ".crt"
                local file = io.open(cert_path, "r")
                if file then
                    file:close()
                    ngx.var.proxy_pass = "https://" .. domain .. ngx.var.request_uri
                else
                    ngx.var.proxy_pass = os.getenv("PROXY_PASS_DEFAULT") .. ngx.var.request_uri
                end
            end
        end
    }

    header_filter_by_lua_block {
        if ngx.ctx.rule_type == "no_ws" then
            ngx.header["Upgrade"] = nil
            ngx.header["Connection"] = nil
        end
    }
    #rewrite_by_lua_block {
    #    ngx.req.set_uri(ngx.var.proxy_pass)
    #}
    }

}

# 8080 端口专门处理 lua.host.dir.conf 规则（当设置 PROXY_PASS_ALL 时）
server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11:53 valid=10s;
    client_max_body_size --client_max_body_size--;

    set $proxy_pass_target '';

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass $proxy_pass_target;
        proxy_connect_timeout --proxy_timeout--;
        proxy_send_timeout --proxy_timeout--;
        proxy_read_timeout --proxy_timeout--;

        access_by_lua_block {
            local result = match_host_dir_rules(ngx.var.host, ngx.var.request_uri)
            if result then
                ngx.ctx.rule_type = result.rule_type
                ngx.var.proxy_pass_target = result.proxy_pass
            else
                return ngx.exit(400)
            end
        }

        header_filter_by_lua_block {
            if ngx.ctx.rule_type == "version1" then
                ngx.req.set_header("Connection", "Upgrade")
            elseif ngx.ctx.rule_type == "no_ws" then
                ngx.header["Upgrade"] = nil
                ngx.header["Connection"] = nil
            else
                ngx.req.set_header("Upgrade", ngx.var.http_upgrade)
                ngx.req.set_header("Connection", "Upgrade")
            end
        }
    }
}
