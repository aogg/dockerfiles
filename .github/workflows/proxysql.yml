name: proxysql-构建和提交docker

on:
  push:
    branches: [main]
    paths: 
      - "proxysql/**"
      - ".github/workflows/proxysql.yml"
      - "!**.md"

jobs:

  setup-build-publish-v3:
    runs-on: ubuntu-latest
    name: 构建和推送docker镜像v3
    steps:
    
    - name: 更新代码
      uses: actions/checkout@v3

    - name: 登录 Docker Hub
      uses: docker/login-action@v2
      with:
        username: adockero
        password: ${{ secrets.PASSWORD }}

    - name: 构建镜像  adockero/proxysql:latest
      uses: docker/build-push-action@v3
      with:
        tags: adockero/proxysql:latest
        context: ./proxysql
        file: "./proxysql/Dockerfile"
        pull: true
        push: true
        labels: true
